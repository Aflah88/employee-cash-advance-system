<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="deskripsion"
      content="Form permintaan uang muka kerja untuk pegawai BSPJI bandar lampung"
    />
    <meta
      name="keywords"
      content="uang muka kerja, form UMK, BSPJI, permintaan dana"
    />
    <meta name="author" content="BSPJI Bandar Lampung" />
    <title>Form Uang Muka Kerja</title>
  </head>
  <body>
    <img
      src="assets/image/Logo 1.svg"
      alt="Logo Kementrian Perindustrian"
      width="100"
    />
    <img src="assets/image/Logo 2.svg" alt="Logo BSPJI" width="100" />
    <p>
      Silahkan isi formulir di bawah ini untuk mengajukan permintaan uang muka
      kerja
    </p>

    <h1>Form Permintaan Uang Muka Kerja</h1>
    <h2><strong>DATA PEMOHON</strong></h2>
    <main>
      <!-- Isi Form -->
      <form>
        <label for="nama">Nama Peminta Uang Muka</label>
        <input
          type="text"
          id="nama"
          name="nama"
          required
          placeholder="Masukkan nama lengkap"
        />
        <br /><br />
        <label for="no_um">No. UM</label>
        <input type="text" id="no_um" name="no_um" />
        <br /><br />

        <label for="seksi">Dari Seksi/Subbag</label>
        <input type="text" id="seksi" name="seksi" />
        <br /><br />
        <label for="jumlah_uang">Jumlah permintaan uang muka: Rp</label>
        <input type="number" id="jumlah_uang" name="jumlah_uang" />
        <br /><br />
        <label for="terbilang">Terbilang</label>
        <input type="text" id="terbilang" name="terbilang" />
        <br /><br />
        <label for="kota_tujuan">Kota Tujuan</label>
        <input type="text" id="kota_tujuan" name="kota_tujuan" />
        <p>Dalam Rangka</p>
        <p>Jumlah tersebut untuk pembayaran</p>
        <button type="submit">Kirim</button>
      </form>
    </main>
    <footer>
      <p>&copy; 2026 BSPJI Bandar Lampung</p>
    </footer>
  </body>
</html>
